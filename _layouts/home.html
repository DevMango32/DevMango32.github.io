---
layout: default
---
<!-- home list heading -->
<div class="list-head">
  <b>최신 글</b>
  <i></i>
</div>

{% for post in site.posts %}
<article class="post">
  <a class="card" href="{{ post.url }}">
    {% if post.image %}
    <span class="card-thumb"><img src="{{ post.image }}" alt=""></span>
    {% endif %}
    <span class="card-body">
      <span class="card-cat">{{ post.categories | first }}</span>
      <strong class="card-title">{{ post.title }}</strong>
      <span class="card-desc">{{ post.excerpt | strip_html | normalize_whitespace | truncate: 120 }}</span>
      <span class="card-meta">
        <span>{{ post.date | date: "%Y. %m. %d." }}</span>
      </span>
    </span>
  </a>
</article>
{% endfor %}
<!-- ponytail: 페이징 생략, 글이 한 페이지를 넘기면 jekyll-paginate 추가 -->
